# Xelity SearXNG — JSON API для web_search
# https://docs.searxng.org/admin/settings/settings.html
use_default_settings: true

general:
  instance_name: "Xelity SearXNG"
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  # без json → 403 на format=json
  formats:
    - html
    - json

server:
  # secret_key лучше через SEARXNG_SECRET в .env (ensure-searxng.sh)
  secret_key: "ultrasecretkey"
  limiter: false
  public_instance: false
  image_proxy: false
  method: "GET"

ui:
  static_use_hash: true

outgoing:
  request_timeout: 8.0
